<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Gening AI</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">
                    <span class="logo-icon">✨</span>
                    AI Chat
                </h1>
                <button class="new-chat-btn" onclick="startNewChat()">
                    <span>+</span> New Chat
                </button>
            </div>
            
            <div class="model-selector">
                <label class="selector-label">Select Model</label>
                <select id="modelSelect" class="model-dropdown">
                    <option value="geningai/gpt3">🤖 GPT-3 (General)</option>
                    <option value="geningai/llama-roleplay">🦙 LLaMA (Roleplay)</option>
                </select>
            </div>
            
            <div class="system-prompt-section">
                <label class="selector-label">System Prompt</label>
                <textarea id="systemPrompt" class="system-input" placeholder="You are a helpful assistant..."></textarea>
                <button class="apply-btn" onclick="applySystemPrompt()">Apply</button>
            </div>
            
            <div class="sidebar-footer">
                <div class="credits-info">
                    <span class="credits-label">Credits:</span>
                    <span class="credits-value" id="creditsDisplay">--</span>
                </div>
            </div>
        </aside>

        <!-- Mobile toggle -->
        <button class="sidebar-toggle" onclick="toggleSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
        </button>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="current-model" id="currentModelDisplay">
                    <span class="model-icon">🤖</span>
                    <span class="model-name">GPT-3</span>
                </div>
            </header>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <div class="welcome-icon">✨</div>
                    <h2>Welcome to AI Chat</h2>
                    <p>Select a model and start chatting</p>
                    <div class="quick-prompts">
                        <button onclick="sendQuickPrompt('Hello! How are you?')">Say Hello</button>
                        <button onclick="sendQuickPrompt('Write a Python function')">Write Code</button>
                        <button onclick="sendQuickPrompt('Tell me a joke')">Tell a Joke</button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your message..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">AI responses are generated by Gening AI</p>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
</body>
</html>
